presets:
  value:
    description: "Traditional value investing (low P/E, low P/B)"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_dividend_yield: 0.02
      min_roe: 0.05

  high-dividend:
    description: "High-dividend stocks (dividend yield >= 3%)"
    criteria:
      min_dividend_yield: 0.03
      max_per: 20
      min_roe: 0.05

  growth:
    description: "Pure growth stocks (high ROE, high growth, no undervaluation constraint)"
    mode: "growth"
    criteria:
      min_roe: 0.15
      min_revenue_growth: 0.05
      min_earnings_growth: 0.10
      min_market_cap: 100000000000

  growth-value:
    description: "Growth value (growth potential + undervaluation)"
    criteria:
      max_per: 20
      min_roe: 0.10
      min_revenue_growth: 0.05

  deep-value:
    description: "Deep value (very low P/E and P/B)"
    criteria:
      max_per: 8
      max_pbr: 0.5

  quality:
    description: "Quality value (high ROE + undervaluation)"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_roe: 0.15
      min_dividend_yield: 0.02

  pullback:
    description: "Pullback buying (temporary dip within an uptrend)"
    mode: "pullback"
    criteria:
      max_per: 20
      min_roe: 0.08
      min_revenue_growth: 0.05

  alpha:
    description: "Alpha signal (undervaluation + quality of change + pullback)"
    mode: "alpha"

  trending:
    description: "X trending stocks (evaluate fundamentals of SNS-trending stocks)"
    mode: "trending"

  shareholder-return:
    description: "High-return stocks (dividends + buybacks >= 5%)"
    criteria:
      min_total_shareholder_return: 0.05
      max_per: 20
      min_roe: 0.08

  high-growth:
    description: "High-growth stocks (profit-agnostic, rapid revenue growth, PSR bubble guard)"
    criteria:
      min_revenue_growth: 0.20           # Revenue growth >= 20% (YoY)
      min_quarterly_revenue_growth: 0.10  # Latest quarterly revenue growth >= 10%
      max_psr: 20.0                       # PSR <= 20 (bubble guard)
      min_gross_margin: 0.20              # Gross margin >= 20% (minimum viability)

  small-cap-growth:
    description: "Small-cap rapid growth (market cap <= 100B, rapid revenue growth, 10-bagger candidates)"
    criteria:
      min_revenue_growth: 0.20           # Revenue growth >= 20% (YoY)
      min_quarterly_revenue_growth: 0.10  # Latest quarterly revenue growth >= 10%
      max_psr: 15.0                       # PSR <= 15 (stricter than high-growth's 20)
      min_gross_margin: 0.20              # Gross margin >= 20%
      max_market_cap: 100000000000        # Market cap <= 100B JPY (auto-adjusted for other regions)

  contrarian:
    description: "Contrarian candidates (technically oversold x fundamentally solid)"
    mode: "contrarian"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_roe: 0.03

  momentum:
    description: "Momentum (surge / breakout detection)"
    mode: "momentum"
    criteria:
      min_52wk_change: 0.20
      min_market_cap: 50000000000

  long-term:
    description: "Long-term suitability (high ROE, EPS growth, high dividend, stable companies)"
    criteria:
      max_per: 25
      max_pbr: 3.0
      min_roe: 0.15
      min_dividend_yield: 0.02
      min_earnings_growth: 0.10
      min_market_cap: 100000000000

  market-darling:
    description: "Market darlings (high P/E tolerated, rapid EPS growth, large-cap)"
    criteria:
      min_per: 30
      min_earnings_growth: 0.30
      min_revenue_growth: 0.15
      max_psr: 30.0
      min_gross_margin: 0.20
      min_market_cap: 50000000000
