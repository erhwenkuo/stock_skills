    currency: "THB"
    ticker_suffix: ".BK"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.025

  my:
    region_name: "Malaysia"
    display_name: "Malaysia Stocks"
    aliases: ["my", "malaysia"]
    small_cap_market_cap: 5000000000  # MYR 5B
    exchanges:
      - code: "KLS"
        name: "Bursa Malaysia"
    currency: "MYR"
    ticker_suffix: ".KL"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.035

  id:
    region_name: "Indonesia"
    display_name: "Indonesia Stocks"
    aliases: ["id", "indonesia"]
