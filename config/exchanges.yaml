# Exchange knowledge: region/exchange mapping for yfinance EquityQuery
#
# region:        Region code for yfinance EquityQuery
# region_name:   Display region name (English)
# display_name:  Display name for screening result headers (KIK-514)
# aliases:       Aliases for normalizing user input (KIK-514)
# small_cap_market_cap: Small-cap market cap threshold (local currency, KIK-514)
# market_class:  Legacy mode market class name (KIK-514)
# exchanges:     Exchange codes available in yfinance EquityQuery exchange field
# currency:      Primary currency code
# thresholds:    Default screening thresholds
#   per_max:            P/E upper limit
#   pbr_max:            P/B upper limit
#   dividend_yield_min: Dividend yield lower limit (ratio)
#   roe_min:            ROE lower limit (ratio)
#   rf:                 Risk-free rate (long-term government bond yield estimate)

regions:
  jp:
    region_name: "Japan"
    display_name: "Japanese Stocks"
    aliases: ["japan", "jp"]
    small_cap_market_cap: 100000000000  # JPY 100B
    market_class: "JapanMarket"
    exchanges:
      - code: "JPX"
        name: "Tokyo Stock Exchange (Prime / Standard / Growth)"
      - code: "FKA"
        name: "Fukuoka Stock Exchange"
      - code: "SAP"
        name: "Sapporo Securities Exchange"
    currency: "JPY"
    ticker_suffix: ".T"
    thresholds:
      per_max: 15.0
      pbr_max: 1.0
      dividend_yield_min: 0.025
      roe_min: 0.08
      rf: 0.005

  us:
    region_name: "United States"
    display_name: "US Stocks"
    aliases: ["us"]
    small_cap_market_cap: 1000000000  # $1B
    market_class: "USMarket"
    exchanges:
      - code: "NMS"
        name: "NASDAQ Global Select Market"
      - code: "NYQ"
        name: "New York Stock Exchange"
      - code: "ASE"
        name: "NYSE American (formerly AMEX)"
      - code: "NGM"
        name: "NASDAQ Global Market"
      - code: "NCM"
        name: "NASDAQ Capital Market"
      - code: "PCX"
        name: "NYSE Arca"
      - code: "PNK"
        name: "OTC Pink Sheets"
    currency: "USD"
    ticker_suffix: ""
    thresholds:
      per_max: 20.0
      pbr_max: 3.0
      dividend_yield_min: 0.02
      roe_min: 0.10
      rf: 0.04

  sg:
    region_name: "Singapore"
    display_name: "Singapore Stocks"
    aliases: ["sg", "singapore"]
    small_cap_market_cap: 2000000000  # SGD 2B
    exchanges:
      - code: "SES"
        name: "Singapore Exchange"
    currency: "SGD"
    ticker_suffix: ".SI"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.03

  th:
    region_name: "Thailand"
    display_name: "Thailand Stocks"
    aliases: ["th", "thailand"]
