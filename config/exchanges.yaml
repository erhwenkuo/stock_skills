    exchanges:
      - code: "JKT"
        name: "Indonesia Stock Exchange (IDX)"
    currency: "IDR"
    ticker_suffix: ".JK"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.065

  ph:
    region_name: "Philippines"
    display_name: "Philippines Stocks"
    aliases: ["ph", "philippines"]
